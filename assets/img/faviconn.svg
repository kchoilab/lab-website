<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.06" />
    </filter>
    
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A341E3" />
      <stop offset="100%" stop-color="#5512BA" />
    </linearGradient>
    
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4985F2" />
      <stop offset="100%" stop-color="#1C4FD1" />
    </linearGradient>
    
    <clipPath id="inner-clip">
      <rect x="14" y="24" width="372" height="92" rx="18" />
    </clipPath>
  </defs>

  <rect x="10" y="20" width="380" height="100" rx="22" fill="#FFFFFF" filter="url(#shadow)" stroke="#E5E7EB" stroke-width="1.5" />

  <g clip-path="url(#inner-clip)">
    <polygon points="-10,10 185,10 155,130 -10,130" fill="url(#purpleGrad)" />
    
    <polygon points="198,10 410,10 410,130 168,130" fill="url(#blueGrad)" />
  </g>

  <text x="92" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">IN</text>

  <text x="284" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="60" fill="#FFFFFF" text-anchor="middle">SB</text>
</svg>
